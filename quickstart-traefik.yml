services:
  traefik:
    image: traefik:v3.1
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - staytracked-network
      - proxy

  ui:
    environment:
      PUBLIC_URL: http://staytracked.localhost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.staytracked.entrypoints=web"
      - "traefik.http.routers.staytracked.rule=Host(`staytracked.localhost`)"
      - "traefik.http.services.staytracked.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    networks:
      - proxy
      - staytracked-network

networks:
  proxy:
