services:
  smtp-proxy:
    build:
      context: smtp-proxy
    ports:
      - 25:25
    volumes:
      - ./smtp-proxy:/app
    env_file:
      - ./.env
    environment:
      - API_HOST=http://ui:3000
    restart: "unless-stopped"
    depends_on:
      - ui
    networks:
      - staytracked-network

  postgres:
    container_name: postgres
    image: postgres:15.2
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./.env
    networks:
      - staytracked-network

  migrate:
    build:
      context: ui
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - staytracked-network
    command: ["yarn", "db:migrate"]

  ui:
    build:
      context: ui
    restart: "unless-stopped"
    env_file:
      - ./.env
      - ./ui/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - migrate
    networks:
      - staytracked-network

networks:
  staytracked-network:

volumes:
  postgres-data:
